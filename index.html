<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Thiệp Mời Tốt Nghiệp</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:linear-gradient(135deg,#6d28d9,#2563eb);
color:white;
text-align:center;
}

.container{
padding:40px 20px;
max-width:700px;
margin:auto;
}

img{
width:220px;
height:220px;
object-fit:cover;
border-radius:50%;
border:5px solid white;
}

.card{
background:rgba(255,255,255,0.15);
padding:30px;
border-radius:20px;
margin-top:20px;
backdrop-filter:blur(8px);
}

h1{
font-size:36px;
}

.info{
font-size:20px;
line-height:1.8;
}

</style>

</head>

<body>

<div class="container">

<img src="https://picsum.photos/500" alt="">

<div class="card">

<h1>🎓 THIỆP MỜI LỄ TỐT NGHIỆP 🎓</h1>

<p>Trân trọng kính mời</p>

<h2>Quý Thầy Cô, Bạn Bè và Gia Đình</h2>

<p>Đến tham dự lễ tốt nghiệp của</p>

<h2>NGUYỄN VĂN A</h2>

<div class="info">
📅 08:00 - 15/08/2026<br>
📍 Hội trường Đại học XYZ
</div>

<p>
Sự hiện diện của quý vị là niềm vinh hạnh của tôi.
</p>

</div>

</div>

</body>
</html>
